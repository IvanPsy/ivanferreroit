        description: "Gestione evidence-based di ADHD con comorbilità ODD e DSA a scuola. Vademecum pratico, script pronti all'uso, dinamiche coi pari, errori comuni da evitare."

      - title: "Neuroscienze, ADHD, Autismo e Dopamina"
        url: /dashboards/neuroscienze-adhd-autismo-with-menu.html
        tag_label: "Neuroscienze"
        description: "Come funzionano davvero il sistema dopaminergico e i circuiti attentivi nei profili neurodivergenti. Base teorica per interventi informati dalle neuroscienze."

      - title: "Cognitivo, Attenzione e Performance Accademica"
        url: /dashboards/cognitivo-attenzione-performance-with-menu.html
        tag_label: "Funzioni Cognitive"
