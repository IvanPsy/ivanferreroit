# ───────────────────────────────────────────────────────────────────────
# Single source of truth per il hub /digitale-inclusivo/
# e per il blocco riassuntivo in /dashboards/.
#
# Aggiungere una risorsa = appendere una voce nell'array `cards`
# della sezione giusta. Tutti i contatori del sito (totali generali
# e per categoria) si aggiornano da soli al prossimo build.
#
# Sezioni e card vengono renderizzate nello stesso ordine in cui
# compaiono qui sotto.
# ───────────────────────────────────────────────────────────────────────

sections:

